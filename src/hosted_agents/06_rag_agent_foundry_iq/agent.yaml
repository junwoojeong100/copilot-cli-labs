# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml
# Hosted Agent 배포 스펙 — azd가 컨테이너를 빌드·배포할 때 참조합니다.
kind: hosted
name: maf-lab-rag-iq-agent
protocols:
  - protocol: responses
    version: 1.0.0
resources:
  cpu: '0.5'
  memory: '1.0Gi'
environment_variables:
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
  - name: SEARCH_SERVICE_ENDPOINT
    value: ${SEARCH_SERVICE_ENDPOINT}
  - name: SEARCH_KNOWLEDGE_BASE_NAME
    value: ${SEARCH_KNOWLEDGE_BASE_NAME}
  - name: FOUNDRY_IQ_REASONING_EFFORT
    value: ${FOUNDRY_IQ_REASONING_EFFORT}
