# `azd ai agent init -m <이 파일>` 의 입력으로 사용되는 매니페스트입니다.
# init이 끝나면 위 agent.yaml 같은 azd 프로젝트 파일이 생성됩니다.
name: maf-lab-rag-iq-agent
description: >
  Microsoft Agent Framework RAG 에이전트(Foundry IQ 지식 베이스 + agentic retrieval)를
  Foundry Hosted Agent로 배포하는 실습 예제입니다.
metadata:
  tags:
    - Agent Framework
    - Hosted Agent
    - Responses Protocol
    - RAG
    - Foundry IQ
template:
  name: maf-lab-rag-iq-agent
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: SEARCH_SERVICE_ENDPOINT
      value: "{{SEARCH_SERVICE_ENDPOINT}}"
    - name: SEARCH_KNOWLEDGE_BASE_NAME
      value: "{{SEARCH_KNOWLEDGE_BASE_NAME}}"
    - name: FOUNDRY_IQ_REASONING_EFFORT
      value: "{{FOUNDRY_IQ_REASONING_EFFORT}}"
resources:
  # 이미 배포한 모델 이름으로 바꾸세요(이 저장소 기본값은 gpt-5.4).
  - kind: model
    id: gpt-5.4
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
